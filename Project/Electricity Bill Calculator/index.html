<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
   <link rel="stylesheet" href="style.css" />
    <title>Electricity Bill Calculator</title>
  </head>

  <body>
    <div
      class="billheader rounded-top-4 border-0 text-light mx-auto mt-5 p-2 text-center"
    >
      Electricity Bill Calculator
    </div>

    <div class="bill-box bg-white rounded-5 border mx-auto mt-1">
      <form class="d-flex flex-column gap-3 p-4">
        <label for="units">Electricity Units</label>

        <div class="input-group">
          <input
            type="number"
            name="units"
            placeholder="Enter consumed units"
            id="units"
            class="form-control border-0 border-bottom rounded-0"
          />

          <span class="input-group-text border-0 rounded-0 bg-white">
            <i class="bi bi-lightning-charge-fill"></i>
          </span>
        </div>

        <div class="slab-box p-3 rounded-4">
          <h5 class="fw-bold text-center mb-3">Electricity Rate Slabs</h5>

          <p>
            First 50 units :
            <span class="fw-bold"> ₹0.50 / unit </span>
          </p>

          <p>
            51 – 200 units :
            <span class="fw-bold"> ₹0.75 / unit </span>
          </p>

          <p>
            201 – 450 units :
            <span class="fw-bold"> ₹1.20 / unit </span>
          </p>

          <p>
            Above 450 units :
            <span class="fw-bold"> ₹1.50 / unit </span>
          </p>
        </div>
      </form>

      <div id="result" class="fw-bold text-center d-none fs-3">
        Total Bill :
        <span id="bill"></span>
      </div>

      <div class="text-center p-3">
        <button type="button" class="btn btn-primary px-4" id="calculateBtn">
          Calculate
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
