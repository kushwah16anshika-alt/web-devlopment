<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div
      class="billheader rounded-top-4 border-0 text-light mx-auto mt-5 p-2 text-center"
    >
      Electricity Bill Calculator
    </div>
    <div class="bill-box w-25 bg-white rounded-5 border mx-auto mt-1">
      <form class="d-flex flex-column align-content-center gap-3 p-3">
        <label for="unit">Electricity Units</label>
        <div class="input-group">
          <input
            type="number"
            name="Units"
            placeholder="Enter consumed unit"
            id="units"
            class="form-control border-0 border-bottom rounded-0"
          />
          <span class="input-group-text border-0 rounded-0 bg-white">
            <i class="bi bi-lightning-charge-fill"></i>
          </span>
        </div>
        <label for="rate">rate per unit</label>
        <div class="input-group">
             <input
            type="number"
            name="rate"
            placeholder="Enter rate per unit"
            id="rate"
            class="form-control border-0 border-bottom rounded-0"
          />

          <span class="input-group-text border-0 rounded-0 bg-white">
            <i class="bi bi-currency-rupee"></i>
          </span>

        </div>
        <label for="extra">Extra Charges</label>

        <input
          type="number"
          name="extra"
          placeholder="Meter / service charges"
          id="extra"
          class="form-control border-0 border-bottom rounded-0"
        />

      </form>
      <div id="result" class="fw-bold text-center d-none fs-4">
           Total Bill :<span id="bill"></span>
      </div>
      <button type="button" class="btn m-3 btn-primary" id="calculateBtn">
        Calculate
      </button>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
