<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <!-- <img src="CalculatorBGImage.png" alt="bgimage"/> -->
    <form>
      <!-- <img src="CalculatorBGImage.png" alt="bgimage"/> -->
      <div
        class="container calculator  rounded-top-5 rounded-bottom-5 border-0 p-2 " id="keydown"
      >
        <div
            class="upper-box border rounded-top-5 mb-1"
        >
          <input
            type="text"
            id="num"
            value="0"
            class="num bg-transparent border-0 text-end w-100 fs-2"
            readonly
          />
        </div>

        <div class="lower-box border rounded-bottom-5 pt-3 pb-3">
          <div class="d-flex gap-3 mt-2 justify-content-center">
            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              AC
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              C
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              %
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle border-0 operator-btn"
            >
              /
            </button>
          </div>
          <div class="d-flex gap-3 mt-2 justify-content-center">
            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              7
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              8
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              9
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle border-0 operator-btn"
            >
              *
            </button>
          </div>
          <div class="d-flex gap-3 mt-2 justify-content-center">
            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              4
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              5
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              6
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle border-0 operator-btn"
            >
              -
            </button>
          </div>
          <div class="d-flex gap-3 mt-2 justify-content-center">
            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              1
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              2
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              3
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle border-0 operator-btn"
            >
              +
            </button>
          </div>
          <div class="d-flex gap-3 mt-2 justify-content-center">
            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
             0
            </button>

            <button
              type="button"
              class="cmbbtn rounded-circle bg-white border-0"
            >
              .
            </button>

            <button
              type="button"
              class="equal-btn text-white border-0"
            >
              =
            </button>

           
          </div>
        </div>
      </div>
    </form>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
