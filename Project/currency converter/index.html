<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Document</title>
  </head>
  <body class="bg-primary">
    <header>
      <div class="bg-warning text-center">
        <h2>CURRENCY CONVERTER</h2>
      </div>
    </header>
    <main>
      <div class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-md-4 text-center">
            <img
              id="fromflag"
              src="https://flagcdn.com/w320/in.png"
              width="120"
            />

            <select id="fromcountry" class="form-select mt-3"></select>
          </div>
          <div class="col-md-4 text-center">
            <img
              id="toflag"
              src="https://flagcdn.com/w320/us.png"
              width="120"
            />

            <select id="tocountry" class="form-select mt-3"></select>
          </div>
        </div>
        <div class="row justify-content-center mt-4">
          <div class="col-md-3">
            <input
              type="number"
              id="amount"
              class="form-control"
              placeholder="Enter Amount"
            />
          </div>
        </div>

        <div class="row justify-content-center mt-3">
          <div class="col-md-2 d-grid">
            <button class="btn btn-primary" id="converterbtn">convert</button>
          </div>
        </div>
        <div class="row justify-content-center mt-4">
          <div class="col-md-3 text-center">
            <h2 id="result">Converted Amount :</h2>
          </div>
        </div>
      </div>
    </main>
    <script src="codes.json"></script>
    <script src="script.js"></script>
  </body>
</html>
