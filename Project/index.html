<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="w-25 bg-light rounded shadow border mx-auto mt-5">
      <h1 class="text-center mb">Age calculator</h1>
      <form class="d-flex flex-column gap-3 align-items-center p-3 w-100">
        <label for="DOB">Enter your date of birth</label>
        <input type="date" name="DOB" id="DOB" class="form-control" />
        <label for="CurrentDate">choose current date</label>
        <input
          type="date"
          name="CurrentDate"
          id="CurrentDate"
          class="form-control"
        />
        <button type="submit" class="btn btn-primary">Calculate age</button>
      </form>
      <div class="fw-bold text-center">
      your age is:<span>my</span>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
