<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Registration</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="container">

  
  <div class="card login">
    <h2><span class="heading">lo</span>gin</h2>

    <div class="input-box">
      <svg viewBox="0 0 24 24">
        <path d="M4 6l8 6 8-6" stroke="currentColor" stroke-width="2" fill="none"/>
    
        <path d="M4 6 H20 V18 H4 Z" stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-box">
      <svg viewBox="0 0 24 24">
       
        <path d="M7 10 H17 Q19 10 19 12 V18 Q19 20 17 20 H7 Q5 20 5 18 V12 Q5 10 7 10 Z"
              stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M8 10V7a4 4 0 0 1 8 0v3"
              stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>

      <input type="password" placeholder="Confirm a password">

      <svg class="eye" viewBox="0 0 24 24">
        <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"
              stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="12" cy="12" r="3"
                stroke="currentColor" stroke-width="2" fill="none"/>
      </svg> 
    </div>

    <div class="options">
      <label><input type="checkbox"> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>

    <button>login Now</button>

    <p class="bottom">Don’t have an account? <a href="#">Signup now</a></p>
  </div>

  <div class="card">
    <h2><span class="heading">Re</span>gistration</h2>

    <div class="input-box">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"
                stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M4 20c2-4 6-6 8-6s6 2 8 6"
              stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
      <input type="text" placeholder="Enter your name">
    </div>

    <div class="input-box">
      <svg viewBox="0 0 24 24">
        <path d="M4 6l8 6 8-6"
              stroke="currentColor" stroke-width="2" fill="none"/>
      
        <path d="M4 6 H20 V18 H4 Z"
              stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-box">
      <svg viewBox="0 0 24 24">
       
        <path d="M7 10 H17 Q19 10 19 12 V18 Q19 20 17 20 H7 Q5 20 5 18 V12 Q5 10 7 10 Z"
              stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M8 10V7a4 4 0 0 1 8 0v3"
              stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
      <input type="password" placeholder="Create a password">
    </div>

    <div class="input-box">
      <svg viewBox="0 0 24 24">
       
        <path d="M7 10 H17 Q19 10 19 12 V18 Q19 20 17 20 H7 Q5 20 5 18 V12 Q5 10 7 10 Z"
              stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M8 10V7a4 4 0 0 1 8 0v3"
              stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>

      <input type="password" placeholder="Confirm a password">

      <svg class="eye" viewBox="0 0 24 24">
        <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"
              stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="12" cy="12" r="3"
                stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
    </div>

    <div class="options">
      <label><input type="checkbox"> I accept all terms & conditions</label>
    </div>

    <button>Register Now</button>

    <p class="bottom">Already have an account? <a href="#">login now</a></p>
  </div>

</div>

</body>
</html>
