<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login & Registration</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary d-flex justify-content-center align-items-center vh-100">

<div class="container">
  <div class="row justify-content-center g-4">

    <div class="col-md-4">
      <div class="card shadow p-4 border rounded-4">

        <h1 class="mb-4"><span class="text-decoration-underline">Lo</span>gin</h1>

        <div class="position-relative mb-3">
          <span class="position-absolute top-50 start-0 translate-middle-y ms-3">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 6l8 6 8-6"/>
              <path d="M4 6h16v12H4z"/>
            </svg>
          </span>
          <input type="email" class="form-control ps-5" placeholder="Enter your email">
        </div>

        <div class="position-relative mb-3">
          <span class="position-absolute top-50 start-0 translate-middle-y ms-3">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="5" y="10" width="14" height="10" rx="2"/>
              <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
            </svg>
          </span>

          <input type="password" class="form-control ps-5 pe-5" placeholder="Enter password">

          <span class="position-absolute top-50 end-0 translate-middle-y me-3">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>

        <div class="d-flex justify-content-between mb-3 small">
          <div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Remember me</label>
          </div>
          <a href="#" class="text-decoration-none">Forgot password?</a>
        </div>

        <button class="btn btn-primary w-100 mb-3">Login Now</button>

        <p class="text-center small">
          Don’t have an account? <a href="#">Signup now</a>
        </p>

      </div>
    </div>

    <div class="col-md-5">
      <div class="card shadow p-4 border rounded-4">

        <h1 class="mb-4"><span class="text-decoration-underline">Re</span>gisteration</h1>

        <div class="position-relative mb-3">
          <span class="position-absolute top-50 start-0 translate-middle-y ms-3">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c2-4 6-6 8-6s6 2 8 6"/>
            </svg>
          </span>
          <input type="text" class="form-control ps-5" placeholder="Enter your name">
        </div>

        <div class="position-relative mb-3">
          <span class="position-absolute top-50 start-0 translate-middle-y ms-3">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 6l8 6 8-6"/>
              <path d="M4 6h16v12H4z"/>
            </svg>
          </span>
          <input type="email" class="form-control ps-5" placeholder="Enter your email">
        </div>

        <div class="position-relative mb-3">
          <span class="position-absolute top-50 start-0 translate-middle-y ms-3">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="5" y="10" width="14" height="10" rx="2"/>
              <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
            </svg>
          </span>
          <input type="password" class="form-control ps-5" placeholder="Create password">
        </div>

        <div class="position-relative mb-3">
          <span class="position-absolute top-50 start-0 translate-middle-y ms-3">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="5" y="10" width="14" height="10" rx="2"/>
              <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
            </svg>
          </span>

          <input type="password" class="form-control ps-5 pe-5" placeholder="Confirm password">

          <span class="position-absolute top-50 end-0 translate-middle-y me-3">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>

        <div class="form-check mb-3 small">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">
            I accept all terms & conditions
          </label>
        </div>

        <button class="btn btn-primary w-100 mb-3">Register Now</button>

        <p class="text-center small">
          Already have an account? <a href="#">Login now</a>
        </p>

      </div>
    </div>

  </div>
</div>

</body>
</html>
