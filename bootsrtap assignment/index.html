<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login & Registration</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-primary d-flex justify-content-center align-items-center vh-100"
  >
    <div class="container">
      <div class="row justify-content-center g-4">
        <!-- LOGIN -->
        <div class="col-md-4">
          <div class="card shadow p-4 border rounded-4">
            <h1 class="mb-4">
              <span class="text-decoration-underline">Lo</span>gin
            </h1>

            <div class="input-group mb-3 align-items-center">
              <span class="input-group-text border-0 bg-transparent">
                <i class="bi bi-envelope"></i>
              </span>
              <input
                type="email"
                class="form-control border-0 border-bottom rounded-0"
                placeholder="Enter your email"
              />
            </div>

            <div class="input-group mb-3 align-items-center">
              <span class="input-group-text border-0 bg-transparent">
                <i class="bi bi-lock"></i>
              </span>
              <input
                type="password"
                class="form-control border-0 border-bottom rounded-0"
                placeholder="Enter password"
              />
              <span class="input-group-text border-0 bg-transparent">
                <i class="bi bi-eye"></i>
              </span>
            </div>

            <div class="d-flex justify-content-between mb-3 small">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" />
                <label class="form-check-label">Remember me</label>
              </div>
              <a href="#" class="text-decoration-none">Forgot password?</a>
            </div>

            <button class="btn btn-primary w-100 mb-3">Login Now</button>

            <p class="text-center small">
              Don’t have an account? <a href="#">Signup now</a>
            </p>
          </div>
        </div>

        <div class="col-md-5">
          <div class="card shadow p-4 border rounded-4">
            <h1 class="mb-4">
              <span class="text-decoration-underline">Re</span>gistration
            </h1>

            <div class="input-group mb-3 align-items-center">
              <span class="input-group-text border-0 bg-transparent">
                <i class="bi bi-person"></i>
              </span>
              <input
                type="text"
                class="form-control border-0 border-bottom rounded-0"
                placeholder="Enter your name"
              />
            </div>

            <div class="input-group mb-3 align-items-center">
              <span class="input-group-text border-0 bg-transparent">
                <i class="bi bi-envelope"></i>
              </span>
              <input
                type="email"
                class="form-control border-0 border-bottom rounded-0"
                placeholder="Enter your email"
              />
            </div>

            <div class="input-group mb-3 align-items-center">
              <span class="input-group-text border-0 bg-transparent">
                <i class="bi bi-lock"></i>
              </span>
              <input
                type="password"
                class="form-control border-0 border-bottom rounded-0"
                placeholder="Create password"
              />
            </div>

            <div class="input-group mb-3 align-items-center">
              <span class="input-group-text border-0 bg-transparent">
                <i class="bi bi-lock"></i>
              </span>
              <input
                type="password"
                class="form-control border-0 border-bottom rounded-0"
                placeholder="Confirm password"
              />
              <span class="input-group-text border-0 bg-transparent">
                <i class="bi bi-eye"></i>
              </span>
            </div>

            <div class="form-check mb-3 small">
              <input class="form-check-input" type="checkbox" />
              <label class="form-check-label">
                I accept all terms & conditions
              </label>
            </div>

            <button class="btn btn-primary w-100 mb-3">Register Now</button>

            <p class="text-center small">
              Already have an account? <a href="#">Login now</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
