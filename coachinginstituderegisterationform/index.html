    <header
      class="bg-primary text-light p-4 justify-content-center align-items-center text-center m-3"
    >
      INSTITUTE REGISTRATION FORM
    </header>
    <main>
      <div
        class="container bg-light rounded border shadow mt-4 m-3 p-5 justify-content-center align-items-center"
      >
        <form id="registrationForm">
          <section class="bg-white p-3 rounded border shadow mb-4">
            <div class="PersonalInformation">
              <div class="bg-primary rounded border p-2 text-light mb-3">
                Personal Information
              </div>

              <div class="mb-3">
                <label for="fullname" class="form-label"> FULL NAME: </label>

                <input
                  type="text"
                  name="fullname"
                  id="fullname"
                  class="form-control"
                  placeholder="Enter your full name"
                />

                <span id="nameerror" class="text-danger small"></span>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label"> EMAIL: </label>

                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Enter your email"
                />

                <span id="emailerror" class="text-danger small"></span>
              </div>

              <div class="mb-3">
                <label for="number" class="form-label"> PHONE NUMBER: </label>

                <input
                  type="number"
                  id="number"
                  class="form-control"
                  placeholder="Enter your phone number"
                />

                <span id="phoneerror" class="text-danger small"></span>
              </div>

              <div class="mb-3">
                <label for="dateofbirth" class="form-label">
                  DATE OF BIRTH:
                </label>

                <input type="date" id="dateofbirth" class="form-control" />

                <span id="doberror" class="text-danger small"></span>
              </div>

              <div class="mb-3">
                <label class="form-label"> GENDER: </label>

                <div class="d-flex gap-4">
                  <div>
                    <input type="radio" name="gender" id="male" value="male" />
                    <span>Male</span>
                  </div>

                  <div>
                    <input
                      type="radio"
                      name="gender"
                      id="female"
                      value="female"
                    />
                    <span>Female</span>
                  </div>

                  <div>
                    <input
                      type="radio"
                      name="gender"
                      id="others"
                      value="others"
                    />
                    <span>Others</span>
                  </div>
                </div>

                <span id="gendererror" class="text-danger small"></span>
              </div>
            </div>
          </section>
          <section class="bg-white p-3 rounded border shadow mb-4">
            <div class="AcademicDetails">
              <div class="bg-primary rounded border p-2 text-light mb-3">
                Academic Details
              </div>

              <div class="mb-3">
                <label for="qualification" class="form-label">
                  LAST COMPLETED QUALIFICATION:
                </label>

                <select id="qualification" class="form-control">
                  <option value="">Select Qualification</option>
                  <option value="10th">10th</option>
                  <option value="12th">12th</option>
                  <option value="Diploma">Diploma</option>
                  <option value="Graduate">Graduate</option>
                  <option value="Postgraduate">Postgraduate</option>
                </select>

                <span id="qualificationerror" class="text-danger small"></span>
              </div>

              <div class="mb-3">
                <label for="grade" class="form-label">
                  PERCENTAGE/GRADE IN LAST QUALIFICATION:
                </label>

                <input
                  type="text"
                  id="grade"
                  class="form-control"
                  placeholder="Enter your percentage or grade"
                />

                <span id="gradeerror" class="text-danger small"></span>
              </div>
            </div>
          </section>
          <section class="bg-white p-3 rounded border shadow mb-4">
            <div class="CourseInformation">
              <div class="bg-primary rounded border p-2 text-light mb-3">
                Course Information
              </div>

              <div class="mb-3">
                <label for="course" class="form-label">
                  PREFERRED COURSE:
                </label>

                <select id="course" class="form-control">
                  <option value="">Select Course</option>
                  <option value="iitjee">IIT-JEE</option>
                  <option value="neet">NEET</option>
                  <option value="banking">Banking Exams</option>
                  <option value="ca">CA/CS</option>
                  <option value="upsc">UPSC</option>
                </select>

                <span id="courseerror" class="text-danger small"></span>
              </div>

              <div class="mb-3">
                <label class="form-label"> BATCH TIMING PREFERENCE: </label>

                <div class="d-flex gap-4 flex-wrap">
                  <div>
                    <input type="checkbox" id="morning" value="Morning" />
                    <span>Morning</span>
                  </div>

                  <div>
                    <input type="checkbox" id="afternoon" value="Afternoon" />
                    <span>Afternoon</span>
                  </div>

                  <div>
                    <input type="checkbox" id="evening" value="Evening" />
                    <span>Evening</span>
                  </div>

                  <div>
                    <input type="checkbox" id="weekend" value="Weekend" />
                    <span>Weekend</span>
                  </div>
                </div>

                <span id="timingerror" class="text-danger small"></span>
              </div>
            </div>
          </section>
          <section class="bg-white p-3 rounded border shadow mb-4">
            <div class="AddressDetails">
              <div class="bg-primary rounded border p-2 text-light mb-3">
                Address Details
              </div>

              <div class="mb-3">
                <label for="address" class="form-label"> ADDRESS: </label>

                <textarea
                  id="address"
                  class="form-control"
                  placeholder="Enter your address"
                ></textarea>

                <span id="addresserror" class="text-danger small"></span>
              </div>

              <div class="mb-3">
                <label for="city" class="form-label"> CITY: </label>

                <input
                  type="text"
                  id="city"
                  class="form-control"
                  placeholder="Enter your city"
                />

                <span id="cityerror" class="text-danger small"></span>
              </div>

              <div class="mb-3">
                <label for="pincode" class="form-label"> PIN CODE: </label>

                <input
                  type="text"
                  id="pincode"
                  class="form-control"
                  placeholder="Enter your pin code"
                />

                <span id="pinerror" class="text-danger small"></span>
              </div>
            </div>
          </section>
          <div class="d-flex justify-content-between">
            <button type="reset" class="btn btn-secondary">CLEAR</button>

            <button type="submit" class="btn btn-primary">SUBMIT</button>
          </div>
        </form>
      </div>
    </main>
