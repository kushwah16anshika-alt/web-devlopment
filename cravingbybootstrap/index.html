<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Craving UI</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div class="navbar bg-danger py-3 px-3 d-flex align-items-center fixed-top shadow">
      <img src="craving.png" width="70" class="img-fluid" alt="logo">

      <div class="ms-auto">
        <button class="text-light bg-transparent border-0 fs-5">Login</button>
        <button class="bg-light text-danger border-0 rounded-2 fs-5 ms-2 me-3 px-3 py-1">
          Register
        </button>
      </div>
    </div>
  </header>

  <main class="mt-5">

    <div id="carouselExample"
         class="carousel slide"
         data-bs-ride="carousel"
         data-bs-interval="2000"
         data-bs-pause="false">

      <div class="carousel-inner">

        <div class="carousel-item active position-relative">
          <img src="underthejammun1.webp" class="d-block w-100" alt="img1">

          <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"></div>

          <div class="position-absolute top-50 start-50 translate-middle text-center text-white w-75">

            <h1 class="fw-bold display-4">
              Your Favorite Food,<br>Delivered Fast
            </h1>

            <p class="fs-5">
              Order from thousands of restaurants and get it delivered to your doorstep
            </p>

            <div class="mt-3">
              <button class="btn btn-warning px-4 me-2">Sign Up</button>
              <button class="btn btn-light px-4">Order Now</button>
            </div>

            <div class="input-group mt-4">
              <span class="input-group-text bg-white">
                <i class="bi bi-search"></i>
              </span>
              <input type="text" class="form-control" placeholder="Search restaurants or dishes...">
            </div>

          </div>
        </div>

        <div class="carousel-item">
          <img src="underthemango1.avif" class="d-block w-100" alt="img2">
        </div>

        <div class="carousel-item">
          <img src="underthemango2.avif" class="d-block w-100" alt="img3">
        </div>

      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
