<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="fullname">Full Name :</label>
    <input type="text" name="fullname" id="fullname" placeholder=" Enter your name">
    <br>
    <input type="number" name="fullname" id="fullname" >
    <br>
    <input type="email" name="fullname" id="fullname" placeholder=" Enter your email">
    <br>
    <input type="password" name="fullname" id="fullname" placeholder=" Enter your password">
    <br>
    <input type="date" name="fullname" id="fullname" >
    <br>
    <input type="time" name="fullname" id="fullname" >
    <br>
    <input type="url" name="fullname" id="fullname" >
    <br>
    <input type="file" name="fullname" id="fullname" >
    <br>
    <input type="range" name="fullname" id="fullname" >
    <br>
</body>
</html>
