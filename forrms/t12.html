<!DOCTYPE html>
<html>
<head>
    <title>Task 12 - Library Membership Form</title>
</head>
<body>

<h2>Task 12: Library Membership Form</h2>
<form>
    <fieldset>
        <legend>Library Membership Form</legend>

        <label>First Name:</label>
        <input type="text" name="fname"><br><br>

        <label>Last Name:</label>
        <input type="text" name="lname"><br><br>

        <label>Date of Birth:</label>
        <input type="date" name="dob"><br><br>

        <label>Gender:</label>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <input type="radio" name="gender" value="other"> Other<br><br>

        <label>Email:</label>
        <input type="email" name="email"><br><br>

        <label>Phone Number:</label>
        <input type="tel" name="phone"><br><br>

        <label>Membership Type:</label><br>
        <input type="radio" name="membership" value="student"> Student<br>
        <input type="radio" name="membership" value="adult"> Adult<br>
        <input type="radio" name="membership" value="senior"> Senior Citizen<br><br>

        <label>Preferred Genres:</label><br>
        <input type="checkbox" name="genre" value="fiction"> Fiction<br>
        <input type="checkbox" name="genre" value="nonfiction"> Non-Fiction<br>
        <input type="checkbox" name="genre" value="science"> Science<br>
        <input type="checkbox" name="genre" value="history"> History<br>
        <input type="checkbox" name="genre" value="biography"> Biography<br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="3" cols="40"></textarea><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </fieldset>
</form>

</body>
</html>
