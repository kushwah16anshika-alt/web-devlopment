<!DOCTYPE html>
<html>
<head>
    <title>Task 3 - Registration Form</title>
</head>
<body>

<h2>Task 3: Registration Form</h2>
<form>
    <label>First Name :</label>
    <input type="text" name="fname" placeholder="Enter First Name"><br><br>

    <label>Last Name :</label>
    <input type="text" name="lname" placeholder="Enter Last Name"><br><br>

    <label>Email :</label>
    <input type="email" name="email" placeholder="Enter Email Address"><br><br>

    <label>Password :</label>
    <input type="password" name="password"><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="gender" value="male"> Male<br>
    <input type="radio" name="gender" value="female"> Female<br>
    <input type="radio" name="gender" value="other"> Other<br><br>

    <label>Age :</label>
    <input type="number" name="age"><br><br>

    <label>Preferences :</label><br>
    <input type="checkbox" name="pref" value="Acrylic"> Acrylic Painting<br>
    <input type="checkbox" name="pref" value="Oil"> Oil Painting<br>
    <input type="checkbox" name="pref" value="Water"> Water Color Painting<br><br>

    <label>Select Occupation :</label>
    <select name="occupation">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="other">Other</option>
    </select><br><br>

    <label>Share few lines about yourself ...</label><br>
    <textarea name="bio" rows="4" cols="40" placeholder="Bio"></textarea><br><br>

    <input type="reset" value="RESET">
    <input type="submit" value="SUBMIT">
</form>

</body>
</html>
