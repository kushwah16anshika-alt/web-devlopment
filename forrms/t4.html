<!doctype html>
<html>
  <head>
    <title>Task 4 - Application Form</title>
  </head>
  <body>
    <h2>Task 4: Application Form</h2>
    <form>
      <label>First Name:</label>
      <input type="text" name="fname" /><br /><br />

      <label>Last Name:</label>
      <input type="text" name="lname" /><br /><br />

      <label>Date of Birth:</label>
      <input type="date" name="dob" /><br /><br />

      <label>Age:</label>
      <input type="number" name="age" /><br /><br />

      <label>Gender:</label>
      <input type="radio" name="gender" value="male" /> Male
      <input type="radio" name="gender" value="female" /> Female
      <input type="radio" name="gender" value="other" /> Other<br /><br />

      <label>Email Address:</label>
      <input
        type="email"
        name="email"
        placeholder="Enter email address"
      /><br /><br />

      <label>Positions Available:</label><br />
      <input type="checkbox" name="position" value="junior" /> Junior
      Developer<br />
      <input type="checkbox" name="position" value="mid" /> Mid-level
      Developer<br />
      <input type="checkbox" name="position" value="senior" /> Senior
      Developer<br /><br />

      <label>Programming Languages:</label><br />
      <input type="checkbox" name="lang" value="java" /> Java<br />
      <input type="checkbox" name="lang" value="javascript" /> JavaScript<br />
      <input type="checkbox" name="lang" value="python" /> Python<br /><br />

      <label>Password:</label>
      <input type="password" name="password" /><br /><br />

      <label>Confirm Password:</label>
      <input type="password" name="confirm" /><br /><br />

      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>
  </body>
</html>
