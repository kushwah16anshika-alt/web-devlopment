<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>All Assignments</h1>

    <div class="box">
      <h2>Assignment 1</h2>

      Name: <input type="text" id="name" /><br /><br />
      City: <input type="text" id="city" /><br /><br />

      <button onclick="showData()">Submit</button>

      <div id="result1"></div>
    </div>

    <div class="box">
      <h2>Assignment 2</h2>

      Email: <input type="email" id="email" /><br /><br />
      Password: <input type="password" id="password" /><br /><br />

      <button onclick="showLogin()">Submit</button>

      <div id="result2"></div>
    </div>

    <div class="box">
      <h2>Assignment 3</h2>

      First Name: <input type="text" id="first" /><br /><br />
      Last Name: <input type="text" id="last" /><br /><br />

      <button onclick="showFullName()">Submit</button>

      <div id="result3"></div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
